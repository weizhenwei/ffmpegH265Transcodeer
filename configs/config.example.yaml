app:
  role: master
  node_id: master-01
  log_level: INFO
  service_name: h265-transcoder

db:
  # 默认使用本地 SQLite，确保开箱即用。
  # 分布式部署请通过环境变量 DB_URL 覆盖为 PostgreSQL，例如：
  # postgresql+psycopg://transcoder:transcoder@<db-host>:5432/transcode
  url: sqlite:///./transcode.db

storage:
  # 分布式部署建议使用共享存储挂载路径，所有 master/worker 节点保持一致
  input_root: ./data/in
  output_root: ./data/out
  output_mode: mirror
  output_suffix: _h265
  overwrite: true

transcode:
  ffmpeg_bin: ffmpeg
  ffprobe_bin: ffprobe
  video_codec: libx265
  crf: 28
  preset: medium
  gop: 48
  audio_codec: aac
  audio_bitrate: 128k
  task_timeout_sec: 1800
  max_retry: 2

worker:
  worker_id: ""
  concurrency: 2
  heartbeat_interval_sec: 10
  poll_block_ms: 5000

scheduler:
  enabled: false
  cron: "0 */1 * * *"
