version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: transcoder
      POSTGRES_PASSWORD: transcoder
      POSTGRES_DB: transcode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcoder -d transcode"]
      interval: 5s
      timeout: 5s
      retries: 10

  master:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.master
    environment:
      DB_URL: postgresql+psycopg://transcoder:transcoder@postgres:5432/transcode
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../data/in:/app/data/in
      - ../data/out:/app/data/out

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    environment:
      DB_URL: postgresql+psycopg://transcoder:transcoder@postgres:5432/transcode
      WORKER_WORKER_ID: ""
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../data/in:/app/data/in
      - ../data/out:/app/data/out

volumes:
  postgres_data:
